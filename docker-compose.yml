version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shitaleco_db}
      POSTGRES_USER: ${POSTGRES_USER:-shitaleco_db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shitaleco_db_user} -d ${POSTGRES_DB:-shitaleco_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shitaleco_db_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-shitaleco_db}
      APP_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://localhost:3002}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Admin (Next.js) ───────────────────────────────────────────────────────
  admin:
    build:
      context: .                          # workspace root (pnpm monorepo)
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - internal

  # ─── Service Portal (Vite SPA — service.shital.org.uk) ───────────────────────
  service:
    build:
      context: .                          # workspace root (pnpm monorepo)
      dockerfile: apps/service/Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_BASE: /
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ─── Quick Donation (Vite SPA served by nginx) ─────────────────────────────
  quick-donation:
    build:
      context: .                          # workspace root (pnpm monorepo)
      dockerfile: apps/quick-donation/Dockerfile
      args:
        VITE_API_URL: ${API_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ─── Kiosk (Vite SPA — web/Android/Electron shared renderer) ──────────────
  kiosk:
    build:
      context: ./apps/kiosk          # standalone — no workspace deps needed
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_BASE: /kiosk/
        VITE_BRANCH_ID: ${BRANCH_ID:-main}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ─── Smart Screen (TV / Android TV — pure HTML/jQuery, no build step) ────────
  screen:
    build:
      context: ./apps/screen            # only needs the screen dir
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/hub:/usr/share/nginx/hub:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - admin
      - service
      - quick-donation
      - kiosk
      - screen
    networks:
      - internal

  # ─── Certbot (auto-renew SSL certs) ────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  certbot-www:
  certbot-certs:

networks:
  internal:
    driver: bridge
