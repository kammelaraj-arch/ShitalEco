server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Next.js static export with basePath=/admin.
    # Main nginx proxies /admin/* to this container (with /admin prefix intact),
    # so we strip /admin and serve from the out/ root.
    location /admin/ {
        # Remove /admin prefix before looking up the file
        rewrite ^/admin(/.*)?$ $1 break;
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Redirect bare /admin to /admin/
    location = /admin {
        return 301 /admin/;
    }

    # Next.js static assets — long-lived cache
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location = /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
}
