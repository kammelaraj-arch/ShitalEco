services:
  - type: web
    name: shital-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install . && PYTHONPATH=src alembic upgrade head
    startCommand: PYTHONPATH=src uvicorn shital.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        generateValue: false
        value: "postgresql+asyncpg://shital:shital@localhost:5432/shital"
      - key: REDIS_URL
        value: "redis://localhost:6379"
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "https://shital-kiosk.vercel.app,https://shital-admin.vercel.app"
      - key: MS_CLIENT_ID
        value: "bffbf7af-3bdb-4b05-94ca-fd7313e5ba28"
      - key: MS_TENANT_ID
        value: "cfbf46ad-f8bd-4a26-b0d5-989df0c6e8cc"
      - key: MS_CLIENT_SECRET
        value: "x1f8Q~I_H3PDVomGQbDr1PX71tdWLOEdyO4s3cua"
      - key: STRIPE_TERMINAL_LOCATION_ID
        value: "tml_Gcuz0gCsvSvQZg"
    healthCheckPath: /api/v1/ping

databases:
  - name: shital-db
    databaseName: shital
    user: shital
    plan: free
