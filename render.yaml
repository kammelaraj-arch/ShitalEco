services:
  - type: web
    name: shital-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn shital.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        generateValue: false
        value: "postgresql+asyncpg://shital:shital@localhost:5432/shital"
      - key: REDIS_URL
        value: "redis://localhost:6379"
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "https://shital-kiosk.vercel.app,https://shital-admin.vercel.app"
    healthCheckPath: /health

databases:
  - name: shital-db
    databaseName: shital
    user: shital
    plan: free
