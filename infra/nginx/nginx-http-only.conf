# Temporary HTTP-only config used during initial Let's Encrypt cert issuance.
# After certs are obtained, switch back to nginx.conf.
worker_processes auto;
pid /var/run/nginx.pid;
events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name shital.org.uk www.shital.org.uk admin.shital.org.uk api.shital.org.uk;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'ShitalEco — cert pending';
            add_header Content-Type text/plain;
        }
    }
}
