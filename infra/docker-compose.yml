# ─────────────────────────────────────────────────────────────────────────────
# Shital Temple ERP — Full Stack Docker Compose
# Runs: Python backend, Next.js admin, PostgreSQL, Redis,
#        MeiliSearch, and Nginx reverse proxy
# ─────────────────────────────────────────────────────────────────────────────

name: shital

networks:
  shital-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  sharepoint_cache:
  letsencrypt_data:

services:

  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shital-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shital
      POSTGRES_USER: shital
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shital_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - shital-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shital -d shital"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shital-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - shital-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MeiliSearch ────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: shital-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-meili_dev_master_key}
      MEILI_ENV: ${NODE_ENV:-development}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - shital-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Python Backend (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: shital-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shital:${POSTGRES_PASSWORD:-shital_dev_password}@postgres:5432/shital
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      MEILISEARCH_URL: http://meilisearch:7700
      APP_ENV: ${APP_ENV:-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shital-net
    volumes:
      - sharepoint_cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Admin Portal (Next.js) ──────────────────────────────────────────────────
  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    container_name: shital-admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - shital-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/admin"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Kiosk App (Vite/React SPA) ─────────────────────────────────────────────
  kiosk:
    build:
      context: ../apps/kiosk
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_BASE: /
        VITE_BRANCH_ID: main
    container_name: shital-kiosk
    restart: unless-stopped
    networks:
      - shital-net
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Quick Donation App (Vite/React SPA) ─────────────────────────────────────
  quick-donation:
    build:
      context: ..
      dockerfile: apps/quick-donation/Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: shital-donate
    restart: unless-stopped
    networks:
      - shital-net
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Smart Screen App (static HTML) ──────────────────────────────────────────
  screen:
    build:
      context: ../apps/screen
      dockerfile: Dockerfile
    container_name: shital-screen
    restart: unless-stopped
    networks:
      - shital-net
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Backup Scheduler (daily at 02:00 London time) ──────────────────────────
  backup-scheduler:
    build:
      context: ./cron
    container_name: shital-backup-cron
    restart: unless-stopped
    environment:
      TZ: Europe/London
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shital_dev_password}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../infra/backup.sh:/opt/shitaleco/infra/backup.sh:ro
      - /opt/shitaleco/backups:/opt/shitaleco/backups
      - /opt/shitaleco/.env:/opt/shitaleco/.env:ro
      - sharepoint_cache:/opt/shitaleco/cache
    depends_on:
      - postgres
    networks:
      - shital-net

  # ─── Nginx Reverse Proxy + SSL ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: shital-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - letsencrypt_data:/var/www/certbot:ro
    depends_on:
      - backend
      - admin
      - kiosk
      - quick-donation
      - screen
    networks:
      - shital-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
