<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shital — Briefly Unavailable</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#0a0404;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .card{max-width:420px;width:100%}
  .om{font-size:64px;margin-bottom:1.5rem;animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  h1{font-size:1.5rem;font-weight:900;color:#FF9933;margin-bottom:.5rem}
  p{color:rgba(255,255,255,0.55);font-size:.9rem;line-height:1.6;margin-bottom:1rem}
  .btn{display:inline-block;background:linear-gradient(135deg,#FF9933,#e55c00);color:#fff;font-weight:800;padding:.75rem 2rem;border-radius:999px;text-decoration:none;margin-top:.5rem;font-size:.9rem}
  .code{display:inline-block;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:.2rem .6rem;font-family:monospace;font-size:.75rem;color:#FF9933;margin-top:1.5rem}
</style>
</head>
<body>
<div class="card">
  <div class="om">🕉️</div>
  <h1>Back in a moment</h1>
  <p>The admin portal is restarting. This usually takes under 60 seconds. Please refresh the page.</p>
  <a href="javascript:location.reload()" class="btn">↻ Refresh Page</a>
  <br><span class="code">502 — service restarting</span>
</div>
<script>setTimeout(()=>location.reload(),30000)</script>
</body>
</html>
