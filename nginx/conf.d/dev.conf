# ─── Dev environment — HTTP only, port 8080 ───────────────────────────────────
# Access at: http://192.248.147.205:8080
# All service names use -dev suffix (from docker-compose.dev.yml)

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # Dev banner header so it's obvious you're on dev
    add_header X-Environment "dev" always;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        set $be http://backend-dev:8000;
        proxy_pass         $be;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
    }

    location /health {
        set $be http://backend-dev:8000;
        proxy_pass        $be;
        proxy_set_header  Host $host;
        proxy_connect_timeout 5s;
    }

    # ── Admin portal ──────────────────────────────────────────────────────────
    location /admin {
        set $adm http://admin-dev:3001;
        proxy_pass         $adm;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Kiosk ─────────────────────────────────────────────────────────────────
    location = /kiosk { return 301 /kiosk/; }
    location /kiosk/ {
        set $ksk http://kiosk-dev:80;
        rewrite ^/kiosk/(.*)$ /$1 break;
        proxy_pass         $ksk;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_connect_timeout 10s;
    }

    # ── Screen ────────────────────────────────────────────────────────────────
    location = /screen { return 301 /screen/; }
    location /screen/ {
        set $sc http://screen-dev:80;
        rewrite ^/screen/(.*)$ /$1 break;
        proxy_pass         $sc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_connect_timeout 10s;
    }

    # ── Donations ─────────────────────────────────────────────────────────────
    location = /donate { return 301 /donate/; }
    location /donate/ {
        set $qd http://quick-donation-dev:80;
        rewrite ^/donate/(.*)$ /$1 break;
        proxy_pass         $qd;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_connect_timeout 10s;
    }

    # ── Hub (root) ────────────────────────────────────────────────────────────
    location = / {
        root  /usr/share/nginx/hub;
        index index.html;
        try_files /index.html =404;
    }
    location / {
        root  /usr/share/nginx/hub;
        try_files $uri /index.html;
    }
}
