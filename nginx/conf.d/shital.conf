# ─── admin.shital.org.uk — redirect to path-based admin portal ───────────────
# The admin portal lives at shital.org.uk/admin (Next.js basePath=/admin).
# Azure AD redirect URI must be https://shital.org.uk/admin/auth-callback
# (same origin as the portal so popup.location.hash is readable).
# This block redirects any direct hits to admin.shital.org.uk → correct URL.
server {
    listen 80;
    server_name admin.shital.org.uk;

    # Let's Encrypt ACME challenge (needed for future cert expansion)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://shital.org.uk/admin$request_uri;
    }
}

# ─── HTTP server — redirect all traffic to HTTPS ──────────────────────────────
server {
    listen 80;
    server_name shital.org.uk www.shital.org.uk;

    # Let's Encrypt ACME challenge must stay on HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name shital.org.uk www.shital.org.uk;

    # ── Certificates (issued by Certbot) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/shital.org.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shital.org.uk/privkey.pem;

    # ── Modern TLS settings ───────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── HSTS (1 year — only enable once you're sure HTTPS works) ─────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Docker embedded DNS — re-resolves upstream IPs dynamically after restarts.
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        set $be http://backend:8000;
        proxy_pass         $be;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
    }

    location /health {
        set $be http://backend:8000;
        proxy_pass        $be;
        proxy_set_header  Host $host;
        proxy_connect_timeout 5s;
    }

    # ── Admin portal (/admin and /admin/...) ─────────────────────────────────
    # Next.js built with basePath='/admin' — handles /admin/... paths natively.
    # No trailing-slash redirect: Next.js normalises URLs itself (308 /admin/→/admin).
    location /admin {
        set $adm http://admin:3001;
        proxy_pass         $adm;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Temple kiosk (/kiosk/...) ────────────────────────────────────────────
    # Built with VITE_BASE=/kiosk/ — strip prefix before proxying.
    location = /kiosk { return 301 /kiosk/; }
    location /kiosk/ {
        set $ksk http://kiosk:80;
        rewrite ^/kiosk/(.*)$ /$1 break;
        proxy_pass         $ksk;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Smart Screen / TV Display (/screen/...) ──────────────────────────────
    location = /screen { return 301 /screen/; }
    location /screen/ {
        set $sc http://screen:80;
        rewrite ^/screen/(.*)$ /$1 break;
        proxy_pass         $sc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Quick donation (/donate/...) ──────────────────────────────────────────
    # Built with base:'./' (relative paths) — works at any subpath with rewrite.
    location = /donate { return 301 /donate/; }
    location /donate/ {
        set $qd http://quick-donation:80;
        rewrite ^/donate/(.*)$ /$1 break;
        proxy_pass         $qd;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── App Hub (root /) — served directly from nginx, no container needed ───
    location = / {
        root  /usr/share/nginx/hub;
        index index.html;
        try_files /index.html =404;
    }

    # Catch-all: also serve hub for any unmatched paths (404 → hub)
    location / {
        root  /usr/share/nginx/hub;
        try_files $uri /index.html;
    }
}
