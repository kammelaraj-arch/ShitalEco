# ─── HTTP server ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Docker embedded DNS — re-resolves upstream IPs dynamically after restarts.
    # Required when proxy_pass uses a $variable upstream.
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # ── Let's Encrypt ACME challenge ─────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        set $be http://backend:8000;
        proxy_pass         $be;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        set $be http://backend:8000;
        proxy_pass        $be;
        proxy_set_header  Host $host;
        proxy_connect_timeout 5s;
    }

    # ── Admin portal ──────────────────────────────────────────────────────────
    # Next.js is built with basePath='/admin', so it handles /admin/... directly.
    # No prefix stripping needed — just proxy the full path.
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        set $adm http://admin:3001;
        proxy_pass         $adm;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Kiosk (/kiosk/...) ────────────────────────────────────────────────────
    # Kiosk is built with VITE_BASE=/kiosk/, so assets are at /kiosk/assets/...
    # Strip the /kiosk prefix before passing to the kiosk nginx container.
    location = /kiosk {
        return 301 /kiosk/;
    }
    location /kiosk/ {
        set $ksk http://kiosk:80;
        rewrite ^/kiosk/(.*)$ /$1 break;
        proxy_pass         $ksk;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Quick donation (root) ─────────────────────────────────────────────────
    location / {
        set $qd http://quick-donation:80;
        proxy_pass         $qd;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }
}
