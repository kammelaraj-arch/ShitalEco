# ─── HTTP server ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Docker embedded DNS — re-resolves upstream IPs dynamically after restarts.
    # Only applies to proxy_pass directives that use a $variable upstream.
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # ── Let's Encrypt ACME challenge ─────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Backend API (/api/...) ────────────────────────────────────────────────
    # Pass full path to backend — it expects /api/v1/...
    location /api/ {
        set $be http://backend:8000;
        proxy_pass         $be;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        set $be http://backend:8000;
        proxy_pass        $be;
        proxy_set_header  Host $host;
        proxy_connect_timeout 5s;
    }

    # ── Admin portal (/admin/...) → strip /admin prefix → Next.js on :3001 ──
    location /admin/ {
        set $adm http://admin:3001;
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass         $adm;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Admin Next.js static assets (_next/...) → admin container ────────────
    # Without this, /_next/ falls through to location / → quick-donation → 404
    location /_next/ {
        set $adm http://admin:3001;
        proxy_pass         $adm;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_connect_timeout 10s;
    }

    # ── Kiosk (/kiosk/...) → strip /kiosk prefix → kiosk nginx on :80 ───────
    location /kiosk/ {
        set $ksk http://kiosk:80;
        rewrite ^/kiosk/(.*)$ /$1 break;
        proxy_pass         $ksk;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Quick donation kiosk (root — default) ────────────────────────────────
    location / {
        set $qd http://quick-donation:80;
        proxy_pass         $qd;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }
}
