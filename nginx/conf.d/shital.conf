# ─── HTTP server ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Docker embedded DNS resolver — re-resolves upstream hostnames dynamically
    # so nginx doesn't cache stale IPs when containers restart
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy
    location /api/ {
        set $upstream_backend http://backend:8000;
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check passthrough
    location /health {
        set $upstream_backend http://backend:8000;
        proxy_pass         $upstream_backend;
        proxy_set_header   Host $host;
        proxy_connect_timeout 5s;
    }

    # Admin portal
    location /admin/ {
        set $upstream_admin http://admin:3001;
        proxy_pass         $upstream_admin;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # Admin Next.js static assets (must route to admin container, not root)
    location /_next/ {
        set $upstream_admin http://admin:3001;
        proxy_pass         $upstream_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400";
        proxy_connect_timeout 10s;
    }

    # Temple kiosk (touch screen interface)
    location /kiosk/ {
        set $upstream_kiosk http://kiosk:80;
        proxy_pass         $upstream_kiosk/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # Quick donation kiosk (default — root)
    location / {
        set $upstream_qd http://quick-donation:80;
        proxy_pass         $upstream_qd;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }
}
