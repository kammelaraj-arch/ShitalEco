# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name shital.org.uk www.shital.org.uk
                admin.shital.org.uk kiosk.shital.org.uk
                donate.shital.org.uk screen.shital.org.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://shital.org.uk$request_uri;
    }
}

# ─── HTTPS — single server block for all traffic ──────────────────────────────
server {
    listen 443 ssl http2;
    server_name shital.org.uk www.shital.org.uk
                admin.shital.org.uk kiosk.shital.org.uk
                donate.shital.org.uk screen.shital.org.uk;

    ssl_certificate     /etc/letsencrypt/live/shital.org.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shital.org.uk/privkey.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        set $be http://backend:8000;
        proxy_pass         $be;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
    }

    location /health {
        set $be http://backend:8000;
        proxy_pass        $be;
        proxy_set_header  Host $host;
        proxy_connect_timeout 5s;
    }

    # ── Admin portal ──────────────────────────────────────────────────────────
    location /admin {
        set $adm http://admin:3001;
        proxy_pass         $adm;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Kiosk ─────────────────────────────────────────────────────────────────
    location = /kiosk { return 301 /kiosk/; }
    location /kiosk/ {
        set $ksk http://kiosk:80;
        rewrite ^/kiosk/(.*)$ /$1 break;
        proxy_pass         $ksk;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Screen ────────────────────────────────────────────────────────────────
    location = /screen { return 301 /screen/; }
    location /screen/ {
        set $sc http://screen:80;
        rewrite ^/screen/(.*)$ /$1 break;
        proxy_pass         $sc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Donations ─────────────────────────────────────────────────────────────
    location = /donate { return 301 /donate/; }
    location /donate/ {
        set $qd http://quick-donation:80;
        rewrite ^/donate/(.*)$ /$1 break;
        proxy_pass         $qd;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Hub (root) ────────────────────────────────────────────────────────────
    location = / {
        root  /usr/share/nginx/hub;
        index index.html;
        try_files /index.html =404;
    }
    location / {
        root  /usr/share/nginx/hub;
        try_files $uri /index.html;
    }
}
