# =============================================================================
# Shital Eco — nginx routing
#
# Subdomain layout:
#   kiosk.shital.org.uk    → kiosk:80       (temple kiosk, VITE_BASE=/kiosk/)
#   donate.shital.org.uk   → quick-donation:80
#   screen.shital.org.uk   → screen:80
#   admin.shital.org.uk    → admin:3001     (Next.js basePath=/admin)
#   shital.org.uk          → hub + API
#
# All subdomains share the wildcard/SAN cert at /etc/letsencrypt/live/shital.org.uk/
# =============================================================================


# ─── kiosk.shital.org.uk ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name kiosk.shital.org.uk;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    http2 on;
    server_name kiosk.shital.org.uk;

    ssl_certificate     /etc/letsencrypt/live/shital.org.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shital.org.uk/privkey.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # API calls from kiosk app (VITE_API_URL=/api/v1)
    location /api/ {
        set $be http://backend:8000;
        proxy_pass         $be;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
    }

    # Kiosk built with VITE_BASE=/kiosk/ — HTML references assets at /kiosk/...
    # Strip the /kiosk/ prefix so kiosk:80 can serve files from /assets/
    location /kiosk/ {
        set $ksk http://kiosk:80;
        rewrite ^/kiosk/(.*)$ /$1 break;
        proxy_pass         $ksk;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # Root → redirect to kiosk base path; SPA sub-routes proxy through
    location = / { return 301 /kiosk/; }
    location / {
        set $ksk http://kiosk:80;
        proxy_pass         $ksk;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }
}


