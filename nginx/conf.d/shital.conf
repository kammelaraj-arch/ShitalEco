# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── API (api.shital.org) ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.shital.org;

    ssl_certificate     /etc/letsencrypt/live/api.shital.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.shital.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ─── Admin (admin.shital.org) ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.shital.org;

    ssl_certificate     /etc/letsencrypt/live/admin.shital.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.shital.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://admin:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

