# ─── HTTP server ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Docker embedded DNS — re-resolves upstream IPs dynamically after restarts.
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # ── Let's Encrypt ACME challenge ─────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        set $be http://backend:8000;
        proxy_pass         $be;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
    }

    location /health {
        set $be http://backend:8000;
        proxy_pass        $be;
        proxy_set_header  Host $host;
        proxy_connect_timeout 5s;
    }

    # ── Admin portal (/admin and /admin/...) ─────────────────────────────────
    # Next.js built with basePath='/admin' — handles /admin/... paths natively.
    # No trailing-slash redirect: Next.js normalises URLs itself (308 /admin/→/admin).
    location /admin {
        set $adm http://admin:3001;
        proxy_pass         $adm;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Temple kiosk (/kiosk/...) ────────────────────────────────────────────
    # Built with VITE_BASE=/kiosk/ — strip prefix before proxying.
    location = /kiosk { return 301 /kiosk/; }
    location /kiosk/ {
        set $ksk http://kiosk:80;
        rewrite ^/kiosk/(.*)$ /$1 break;
        proxy_pass         $ksk;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── Quick donation (/donate/...) ──────────────────────────────────────────
    # Built with base:'./' (relative paths) — works at any subpath with rewrite.
    location = /donate { return 301 /donate/; }
    location /donate/ {
        set $qd http://quick-donation:80;
        rewrite ^/donate/(.*)$ /$1 break;
        proxy_pass         $qd;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # ── App Hub (root /) — served directly from nginx, no container needed ───
    location = / {
        root  /usr/share/nginx/hub;
        index index.html;
        try_files /index.html =404;
    }

    # Catch-all: also serve hub for any unmatched paths (404 → hub)
    location / {
        root  /usr/share/nginx/hub;
        try_files $uri /index.html;
    }
}
