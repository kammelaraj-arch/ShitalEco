name: Deploy to Vultr

on:
  push:
    branches: [claude/shital-erp-platform-iR2UF, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy & verify on Vultr
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: 192.248.147.205
          username: root
          password: ${{ secrets.VULTR_ROOT_PASSWORD }}
          port: 22
          timeout: 300s
          envs: GH_PAT
          script: |
            set -e

            # Install docker if missing
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            # Clone repo if missing
            if [ ! -d /opt/shitaleco/.git ]; then
              apt-get install -y git -q
              git clone --branch claude/shital-erp-platform-iR2UF \
                https://${GH_PAT}@github.com/kammelaraj-arch/ShitalEco.git /opt/shitaleco
            fi

            cd /opt/shitaleco

            # Pull latest code
            git fetch origin claude/shital-erp-platform-iR2UF
            git reset --hard origin/claude/shital-erp-platform-iR2UF

            # Create .env if missing
            if [ ! -f .env ]; then
              printf 'POSTGRES_DB=shitaleco_db\n' > .env
              printf 'POSTGRES_USER=shitaleco_db_user\n' >> .env
              printf 'POSTGRES_PASSWORD=ShitalEco2024Prod!\n' >> .env
              printf 'JWT_SECRET=shital-temple-erp-jwt-secret-2024-london-prod\n' >> .env
              printf 'APP_ENV=production\n' >> .env
              printf 'CORS_ORIGINS=http://localhost:3001,http://localhost:3002\n' >> .env
              printf 'API_URL=http://localhost:8000\n' >> .env
              printf 'ANTHROPIC_API_KEY=\n' >> .env
              printf 'SENDGRID_API_KEY=\n' >> .env
              printf 'STRIPE_SECRET_KEY=\n' >> .env
              printf 'STRIPE_PUBLISHABLE_KEY=\n' >> .env
              printf 'STRIPE_WEBHOOK_SECRET=\n' >> .env
            fi

            # Open ports
            ufw allow 22/tcp
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw allow 8000/tcp
            ufw --force enable

            # Start/restart services
            docker compose up -d --build

            # Wait for backend
            echo "Waiting for backend..."
            for i in $(seq 1 30); do
              sleep 5
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Backend healthy!"
                break
              fi
              echo "  attempt $i/30..."
            done

            # Patch schema and seed
            curl -sf -X POST http://localhost:8000/api/v1/admin/patch-schema && echo "Schema patched"
            curl -sf -X POST "http://localhost:8000/api/v1/items/seed" && echo "Items seeded"

            # Final health check
            curl -s http://localhost:8000/health
            echo ""
            echo "Deploy complete!"
            docker compose ps
