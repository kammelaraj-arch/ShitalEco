name: Build & Deploy

on:
  push:
    branches: [claude/shital-erp-platform-iR2UF, main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REPO: kammelaraj-arch/shitaleco

jobs:
  # ── BUILD all images on GitHub's fast Linux runners ──────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-backend:latest
            ghcr.io/${{ env.REPO }}-backend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Admin (Next.js) ───────────────────────────────────────────────────
      - name: Build & push admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-admin:latest
            ghcr.io/${{ env.REPO }}-admin:${{ steps.meta.outputs.sha }}
          build-args: NEXT_PUBLIC_API_URL=/api/v1
          cache-from: type=gha,scope=admin-v2
          cache-to: type=gha,mode=max,scope=admin-v2

      # ── Quick Donation (Vite SPA) ─────────────────────────────────────────
      - name: Build & push quick-donation
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/quick-donation/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-quick-donation:latest
            ghcr.io/${{ env.REPO }}-quick-donation:${{ steps.meta.outputs.sha }}
          build-args: VITE_API_URL=/api/v1
          cache-from: type=gha,scope=quick-donation
          cache-to: type=gha,mode=max,scope=quick-donation

      # ── Kiosk ─────────────────────────────────────────────────────────────
      - name: Build & push kiosk
        uses: docker/build-push-action@v5
        with:
          context: ./apps/kiosk
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-kiosk:latest
            ghcr.io/${{ env.REPO }}-kiosk:${{ steps.meta.outputs.sha }}
          build-args: |
            VITE_API_URL=/api/v1
            VITE_BASE=/kiosk/
          cache-from: type=gha,scope=kiosk
          cache-to: type=gha,mode=max,scope=kiosk

      # ── Screen ────────────────────────────────────────────────────────────
      - name: Build & push screen
        uses: docker/build-push-action@v5
        with:
          context: ./apps/screen
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}-screen:latest
            ghcr.io/${{ env.REPO }}-screen:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=screen
          cache-to: type=gha,mode=max,scope=screen

      # ── Make all packages public so server can pull without auth ──────────
      - name: Make packages public
        run: |
          for pkg in shitaleco-backend shitaleco-admin shitaleco-quick-donation shitaleco-kiosk shitaleco-screen; do
            echo -n "Making ${pkg} public: "
            curl -s -X PATCH \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${pkg}" \
              -d '{"visibility":"public"}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('name', d.get('message', 'unknown')))" || true
          done

  # ── DEPLOY — pull pre-built images on the server ─────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vultr
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
        with:
          host: 192.248.147.205
          username: root
          password: ${{ secrets.VULTR_ROOT_PASSWORD }}
          port: 22
          timeout: 300s
          envs: GH_PAT,STRIPE_SECRET_KEY,STRIPE_PUBLISHABLE_KEY,ANTHROPIC_API_KEY,SENDGRID_API_KEY,MS_CLIENT_ID,MS_TENANT_ID,MS_CLIENT_SECRET
          script: |
            # Ensure docker is installed and daemon is running
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi
            systemctl enable docker
            systemctl start docker || true
            sleep 2
            docker compose version

            # Pull latest code (for docker-compose.prod.yml + nginx config)
            if [ -d /opt/shitaleco ]; then
              cd /opt/shitaleco && git fetch origin && git reset --hard origin/claude/shital-erp-platform-iR2UF
            else
              apt-get install -y git -q
              git clone --branch claude/shital-erp-platform-iR2UF \
                https://${GH_PAT}@github.com/kammelaraj-arch/ShitalEco.git /opt/shitaleco
            fi
            cd /opt/shitaleco

            # Create .env if missing
            if [ ! -f .env ]; then
              cat > .env <<'ENVEOF'
            POSTGRES_DB=shitaleco_db
            POSTGRES_USER=shitaleco_db_user
            POSTGRES_PASSWORD=ShitalEco2024Prod!
            JWT_SECRET=shital-temple-erp-jwt-secret-2024-london-prod
            APP_ENV=production
            CORS_ORIGINS=http://localhost:3001,http://localhost:3002,http://localhost:3003
            API_URL=http://192.248.147.205:8000
            BRANCH_ID=main
            ENVEOF
            fi

            # Inject secrets
            [ -n "$STRIPE_SECRET_KEY" ]      && sed -i "s|STRIPE_SECRET_KEY=.*|STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}|" .env      || echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}" >> .env
            [ -n "$STRIPE_PUBLISHABLE_KEY" ] && sed -i "s|STRIPE_PUBLISHABLE_KEY=.*|STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}|" .env || echo "STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}" >> .env
            [ -n "$ANTHROPIC_API_KEY" ]      && sed -i "s|ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}|" .env      || echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> .env
            [ -n "$SENDGRID_API_KEY" ]       && sed -i "s|SENDGRID_API_KEY=.*|SENDGRID_API_KEY=${SENDGRID_API_KEY}|" .env        || echo "SENDGRID_API_KEY=${SENDGRID_API_KEY}" >> .env
            [ -n "$MS_CLIENT_ID" ]           && sed -i "s|MS_CLIENT_ID=.*|MS_CLIENT_ID=${MS_CLIENT_ID}|" .env                    || echo "MS_CLIENT_ID=${MS_CLIENT_ID}" >> .env
            [ -n "$MS_TENANT_ID" ]           && sed -i "s|MS_TENANT_ID=.*|MS_TENANT_ID=${MS_TENANT_ID}|" .env                    || echo "MS_TENANT_ID=${MS_TENANT_ID}" >> .env
            [ -n "$MS_CLIENT_SECRET" ]       && sed -i "s|MS_CLIENT_SECRET=.*|MS_CLIENT_SECRET=${MS_CLIENT_SECRET}|" .env        || echo "MS_CLIENT_SECRET=${MS_CLIENT_SECRET}" >> .env

            # Open ports
            ufw allow 22/tcp 2>/dev/null || true
            ufw allow 80/tcp 2>/dev/null || true
            ufw allow 8000/tcp 2>/dev/null || true
            ufw --force enable 2>/dev/null || true

            # Pull all pre-built images and restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for backend health
            echo "Waiting for backend..."
            for i in $(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Backend healthy after $((i*5))s"
                break
              fi
              echo "  attempt $i/24..."
            done

            # Schema patch + seed
            curl -sf -X POST http://localhost:8000/api/v1/admin/patch-schema && echo "Schema patched" || true
            curl -s -X POST http://localhost:8000/api/v1/items/seed || true

            # Reload nginx
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload 2>/dev/null || true

            echo "=== Deploy complete ==="
            docker compose -f docker-compose.prod.yml ps
