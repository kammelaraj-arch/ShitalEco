name: Deploy to Vultr

on:
  push:
    branches: [claude/shital-erp-platform-iR2UF, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy & verify on Vultr
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
        with:
          host: 192.248.147.205
          username: root
          password: ${{ secrets.VULTR_ROOT_PASSWORD }}
          port: 22
          timeout: 900s
          envs: GH_PAT,STRIPE_SECRET_KEY,STRIPE_PUBLISHABLE_KEY,ANTHROPIC_API_KEY,SENDGRID_API_KEY,MS_CLIENT_ID,MS_TENANT_ID,MS_CLIENT_SECRET
          script: |
            # NOTE: no set -e — we handle errors per-step to avoid full outage on partial failure

            # ── Install docker if missing ──────────────────────────────────────
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            # ── Clone repo if missing ──────────────────────────────────────────
            if [ ! -d /opt/shitaleco/.git ]; then
              apt-get install -y git -q
              git clone --branch claude/shital-erp-platform-iR2UF \
                https://${GH_PAT}@github.com/kammelaraj-arch/ShitalEco.git /opt/shitaleco
            fi

            cd /opt/shitaleco

            # ── Pull latest code ───────────────────────────────────────────────
            git fetch origin claude/shital-erp-platform-iR2UF
            git reset --hard origin/claude/shital-erp-platform-iR2UF

            # ── Create .env if missing ─────────────────────────────────────────
            if [ ! -f .env ]; then
              printf 'POSTGRES_DB=shitaleco_db\n' > .env
              printf 'POSTGRES_USER=shitaleco_db_user\n' >> .env
              printf 'POSTGRES_PASSWORD=ShitalEco2024Prod!\n' >> .env
              printf 'JWT_SECRET=shital-temple-erp-jwt-secret-2024-london-prod\n' >> .env
              printf 'APP_ENV=production\n' >> .env
              printf 'CORS_ORIGINS=http://localhost:3001,http://localhost:3002,http://localhost:3003\n' >> .env
              printf 'API_URL=http://192.248.147.205:8000\n' >> .env
              printf 'BRANCH_ID=main\n' >> .env
              printf 'ANTHROPIC_API_KEY=\n' >> .env
              printf 'SENDGRID_API_KEY=\n' >> .env
              printf 'STRIPE_SECRET_KEY=\n' >> .env
              printf 'STRIPE_PUBLISHABLE_KEY=\n' >> .env
              printf 'STRIPE_WEBHOOK_SECRET=\n' >> .env
              printf 'MS_CLIENT_ID=\n' >> .env
              printf 'MS_TENANT_ID=\n' >> .env
              printf 'MS_CLIENT_SECRET=\n' >> .env
            fi

            # ── Inject secrets into .env (always update, never leave blank) ────
            [ -n "$STRIPE_SECRET_KEY" ]    && sed -i "s|STRIPE_SECRET_KEY=.*|STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}|" .env    || true
            [ -n "$STRIPE_PUBLISHABLE_KEY" ] && sed -i "s|STRIPE_PUBLISHABLE_KEY=.*|STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}|" .env || true
            [ -n "$ANTHROPIC_API_KEY" ]    && sed -i "s|ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}|" .env    || true
            [ -n "$SENDGRID_API_KEY" ]     && sed -i "s|SENDGRID_API_KEY=.*|SENDGRID_API_KEY=${SENDGRID_API_KEY}|" .env     || true
            [ -n "$MS_CLIENT_ID" ]         && sed -i "s|MS_CLIENT_ID=.*|MS_CLIENT_ID=${MS_CLIENT_ID}|" .env               || true
            [ -n "$MS_TENANT_ID" ]         && sed -i "s|MS_TENANT_ID=.*|MS_TENANT_ID=${MS_TENANT_ID}|" .env               || true
            [ -n "$MS_CLIENT_SECRET" ]     && sed -i "s|MS_CLIENT_SECRET=.*|MS_CLIENT_SECRET=${MS_CLIENT_SECRET}|" .env   || true

            # ── Open ports ────────────────────────────────────────────────────
            ufw allow 22/tcp 2>/dev/null || true
            ufw allow 80/tcp 2>/dev/null || true
            ufw allow 443/tcp 2>/dev/null || true
            ufw allow 8000/tcp 2>/dev/null || true
            ufw --force enable 2>/dev/null || true

            # ── Free disk space (Docker cache accumulates) ────────────────────
            docker image prune -f --filter "until=24h" 2>/dev/null || true
            docker builder prune -f --filter "until=24h" 2>/dev/null || true

            # ── Ensure DB and nginx are always running first ───────────────────
            # Start DB and nginx (using existing images — never fails)
            docker compose up -d --no-build db certbot 2>/dev/null || true
            # Start nginx with whatever images exist so HTTP stays up during builds
            docker compose up -d --no-build nginx 2>/dev/null || true

            # ── STEP 1: Build backend (Python — fast, rarely changes) ─────────
            echo "=== Building backend ==="
            if docker compose build backend; then
              echo "Backend built OK — restarting..."
              docker compose up -d --no-build --no-deps backend
            else
              echo "WARNING: Backend build failed — keeping existing container"
            fi

            # ── STEP 2: Build quick-donation (Vite SPA — fast) ───────────────
            echo "=== Building quick-donation ==="
            if docker compose build quick-donation; then
              echo "quick-donation built OK — restarting..."
              docker compose up -d --no-build --no-deps quick-donation
            else
              echo "WARNING: quick-donation build failed — keeping existing container"
            fi

            # ── STEP 3: Build admin (Next.js — slowest, ~5 min) ──────────────
            echo "=== Building admin ==="
            if docker compose build admin; then
              echo "Admin built OK — restarting..."
              docker compose up -d --no-build --no-deps admin
            else
              echo "WARNING: Admin build failed — keeping existing container"
              docker compose logs admin --tail=30 2>/dev/null || true
            fi

            # ── STEP 4: Build kiosk (Vite SPA) — isolated, never breaks core ─
            echo "=== Building kiosk ==="
            if docker compose build kiosk; then
              echo "Kiosk built OK — restarting..."
              docker compose up -d --no-build --no-deps kiosk
            else
              echo "WARNING: Kiosk build failed — skipping"
            fi

            # ── STEP 5: Fix alembic version (one-time migration fix) ──────────
            docker compose exec -T db psql -U shitaleco_db_user -d shitaleco_db \
              -c "UPDATE alembic_version SET version_num='003_gift_aid_declarations' WHERE version_num='003';" \
              2>/dev/null || true

            # ── STEP 6: Wait for backend health ───────────────────────────────
            echo "Waiting for backend (up to 3 min)..."
            HEALTHY=0
            for i in $(seq 1 36); do
              sleep 5
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Backend healthy after $((i*5))s!"
                HEALTHY=1
                break
              fi
              echo "  attempt $i/36..."
            done

            if [ "$HEALTHY" = "0" ]; then
              echo "ERROR: Backend failed to become healthy — dumping logs:"
              docker compose logs backend --tail=80
            fi

            # ── STEP 7: Schema patch + seed (non-fatal) ───────────────────────
            if [ "$HEALTHY" = "1" ]; then
              curl -sf -X POST http://localhost:8000/api/v1/admin/patch-schema && echo "Schema patched" || echo "Schema patch skipped"
              SEED_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "http://localhost:8000/api/v1/items/seed")
              echo "Seed: $SEED_RESP"
            fi

            # ── STEP 8: Reload nginx to pick up new upstream IPs ─────────────
            echo "=== Reloading nginx ==="
            docker compose exec -T nginx nginx -s reload 2>/dev/null || \
              docker compose restart nginx 2>/dev/null || true

            # ── Status summary ────────────────────────────────────────────────
            echo ""
            echo "=== Deploy complete ==="
            docker compose ps
            echo ""
            echo "=== Backend startup logs ==="
            docker compose logs backend --tail=50
