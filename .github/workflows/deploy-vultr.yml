name: Deploy to Vultr

on:
  push:
    branches: [claude/shital-erp-platform-iR2UF, main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vultr (build on server)
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
        with:
          host: 192.248.147.205
          username: root
          password: ${{ secrets.VULTR_ROOT_PASSWORD }}
          port: 22
          timeout: 1800s
          envs: GH_PAT,STRIPE_SECRET_KEY,STRIPE_PUBLISHABLE_KEY,ANTHROPIC_API_KEY,SENDGRID_API_KEY,MS_CLIENT_ID,MS_TENANT_ID,MS_CLIENT_SECRET
          script: |
            set -e

            # ── Docker ────────────────────────────────────────────────────────
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi
            systemctl enable docker && systemctl start docker || true

            # ── Clone / update repo ───────────────────────────────────────────
            if [ -d /opt/shitaleco/.git ]; then
              cd /opt/shitaleco
              git fetch origin
              git reset --hard origin/claude/shital-erp-platform-iR2UF
            else
              apt-get install -y git -q
              git clone --branch claude/shital-erp-platform-iR2UF \
                https://${GH_PAT}@github.com/kammelaraj-arch/ShitalEco.git /opt/shitaleco
            fi
            cd /opt/shitaleco

            # ── .env ─────────────────────────────────────────────────────────
            if [ ! -f .env ]; then
              cat > .env << 'ENVEOF'
            POSTGRES_DB=shitaleco_db
            POSTGRES_USER=shitaleco_db_user
            POSTGRES_PASSWORD=ShitalEco2024Prod!
            JWT_SECRET=shital-temple-erp-jwt-secret-2024-london-prod
            APP_ENV=production
            CORS_ORIGINS=https://shital.org.uk,https://admin.shital.org.uk,https://kiosk.shital.org.uk,https://donate.shital.org.uk,https://screen.shital.org.uk,http://192.248.147.205
            MS_REDIRECT_URI=https://admin.shital.org.uk/auth-callback
            ENVEOF
            fi

            # Inject secrets from GitHub into .env
            inject() {
              local key=$1 val=$2
              [ -z "$val" ] && return
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }
            inject STRIPE_SECRET_KEY      "$STRIPE_SECRET_KEY"
            inject STRIPE_PUBLISHABLE_KEY "$STRIPE_PUBLISHABLE_KEY"
            inject ANTHROPIC_API_KEY      "$ANTHROPIC_API_KEY"
            inject SENDGRID_API_KEY       "$SENDGRID_API_KEY"
            inject MS_CLIENT_ID           "$MS_CLIENT_ID"
            inject MS_TENANT_ID           "$MS_TENANT_ID"
            inject MS_CLIENT_SECRET       "$MS_CLIENT_SECRET"
            # Always set CORS origins and AAD redirect URI (not secrets, safe to hardcode)
            inject CORS_ORIGINS           "https://shital.org.uk,https://admin.shital.org.uk,https://kiosk.shital.org.uk,https://donate.shital.org.uk,https://screen.shital.org.uk,http://192.248.147.205"
            inject MS_REDIRECT_URI        "https://admin.shital.org.uk/auth-callback"

            # ── Firewall ──────────────────────────────────────────────────────
            ufw allow 22/tcp  2>/dev/null || true
            ufw allow 80/tcp  2>/dev/null || true
            ufw allow 443/tcp 2>/dev/null || true
            ufw allow 8000/tcp 2>/dev/null || true
            ufw --force enable 2>/dev/null || true

            # ── Tear down everything cleanly to free ports & networks ────────
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            # Force-stop and remove ALL containers (catches any that compose
            # missed or that were started outside this compose project).
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            # Kill any non-Docker process on port 8000
            fuser -k 8000/tcp 2>/dev/null || true
            # Restart Docker daemon to flush all iptables/NAT rules.
            # All containers were explicitly removed above, so restart: unless-stopped
            # will not re-launch them automatically.
            systemctl restart docker
            sleep 5

            # ── Start DB so backend can connect on first boot ─────────────────
            docker compose -f docker-compose.prod.yml up -d db
            echo "Waiting for DB..."
            for i in $(seq 1 30); do
              sleep 2
              docker compose -f docker-compose.prod.yml exec -T db \
                pg_isready -U shitaleco_db_user -d shitaleco_db &>/dev/null && break
              echo "  db attempt $i/30..."
            done

            # ── Build all images on the server ────────────────────────────────
            GIT_SHA=$(git rev-parse HEAD)
            echo "=== Building backend (${GIT_SHA}) ==="
            docker build -t ghcr.io/kammelaraj-arch/shitaleco-backend:latest \
              --build-arg GIT_SHA="${GIT_SHA}" ./backend

            echo "=== Building quick-donation ==="
            docker build -t ghcr.io/kammelaraj-arch/shitaleco-quick-donation:latest \
              -f apps/quick-donation/Dockerfile \
              --build-arg VITE_API_URL=/api/v1 \
              --build-arg GIT_SHA="${GIT_SHA}" .

            echo "=== Building kiosk ==="
            docker build -t ghcr.io/kammelaraj-arch/shitaleco-kiosk:latest \
              --build-arg VITE_API_URL=/api/v1 --build-arg VITE_BASE=/kiosk/ \
              --build-arg GIT_SHA="${GIT_SHA}" ./apps/kiosk

            echo "=== Building screen ==="
            docker build -t ghcr.io/kammelaraj-arch/shitaleco-screen:latest \
              --build-arg GIT_SHA="${GIT_SHA}" ./apps/screen

            echo "=== Building admin ==="
            docker build -t ghcr.io/kammelaraj-arch/shitaleco-admin:latest \
              -f apps/admin/Dockerfile \
              --build-arg NEXT_PUBLIC_API_URL=/api/v1 \
              --build-arg GIT_SHA="${GIT_SHA}" .

            # ── Start all services ────────────────────────────────────────────
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── Wait for backend ──────────────────────────────────────────────
            echo "Waiting for backend health..."
            for i in $(seq 1 30); do
              sleep 5
              curl -sf http://localhost:8000/health > /dev/null && echo "Backend healthy!" && break
              echo "  attempt $i/30..."
            done

            # ── Seed catalog if empty ────────────────────────────────────────
            curl -sf -X POST http://localhost:8000/api/v1/admin/seed-catalog || true

            # ── Diagnose nginx and certs ─────────────────────────────────────
            echo "=== Nginx status ==="
            docker compose -f docker-compose.prod.yml logs --tail=20 nginx || true

            echo "=== SSL certificates on server ==="
            docker compose -f docker-compose.prod.yml run --rm certbot certificates 2>&1 || true

            echo ""
            echo "=== Deploy complete ==="
            docker compose -f docker-compose.prod.yml ps
