name: Rollback to Previous

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to rollback (backend / admin / kiosk / quick-donation / screen / all)'
        required: true
        default: 'all'

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Rollback service(s) to :previous checkpoint
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.248.147.205
          username: root
          password: ${{ secrets.VULTR_ROOT_PASSWORD }}
          port: 22
          timeout: 300s
          script: |
            set -e
            cd /opt/shitaleco

            SERVICE="${{ github.event.inputs.service }}"
            echo "=== Rolling back: ${SERVICE} ==="

            rollback_svc() {
              local svc=$1
              local img="ghcr.io/kammelaraj-arch/shitaleco-${svc}"
              if docker image inspect "${img}:previous" &>/dev/null; then
                docker tag "${img}:previous" "${img}:latest"
                docker compose -f docker-compose.prod.yml up -d --no-deps "${svc}"
                echo "  rolled back: ${svc}"
              else
                echo "  no :previous checkpoint for ${svc} — skipping"
              fi
            }

            if [ "$SERVICE" = "all" ]; then
              for svc in backend admin quick-donation kiosk screen; do
                rollback_svc "$svc"
              done
            else
              rollback_svc "$SERVICE"
            fi

            echo ""
            echo "=== Rollback complete ==="
            docker compose -f docker-compose.prod.yml ps
