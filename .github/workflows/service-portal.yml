name: Service Portal

on:
  push:
    branches: ['**']
    paths:
      - 'apps/service/**'
      - '.github/workflows/service-portal.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push service portal
        uses: docker/build-push-action@v5
        with:
          context: ./apps/service
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-service:latest
          build-args: |
            VITE_API_URL=/api/v1
            VITE_BASE=/service/
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=service
          cache-to: type=gha,scope=service,mode=max

      - name: Deploy to production
        run: |
          SECRET="${{ secrets.DEPLOY_SECRET }}"
          SECRET="${SECRET:-ShitalDeploy2026!}"
          curl -X POST https://shital.org.uk/deploy \
            -H "X-Deploy-Secret: ${SECRET}" \
            --max-time 15 --retry 3 --retry-delay 5 || true
