name: Shital ERP CI/CD

on:
  push:
    branches: [main, 'claude/**', develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"

jobs:
  # ─── Python Backend Tests ──────────────────────────────────────────────────
  backend-tests:
    name: Python Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shital_test
          POSTGRES_USER: shital
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run linting
        working-directory: backend
        run: ruff check src/

      - name: Run type checking
        working-directory: backend
        run: mypy src/shital --ignore-missing-imports

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://shital:test_password@localhost:5432/shital_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long
          ANTHROPIC_API_KEY: test-key
          APP_ENV: test
        run: pytest tests/ -v --cov=src/shital --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: backend/coverage.xml

  # ─── Frontend Tests ────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @shital/db exec prisma generate

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build --filter=@shital/config --filter=@shital/db

  # ─── Build & Push to GHCR ─────────────────────────────────────────────────
  # Runs on GitHub Actions runners (7 GB RAM, 2 CPUs) — NEVER on the VPS.
  # Production server only does: docker pull + rolling restart.
  docker-build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/claude/')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-backend:${{ steps.tag.outputs.tag }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-admin:${{ steps.tag.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max

      - name: Build & push quick-donation
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/quick-donation/Dockerfile
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-quick-donation:${{ steps.tag.outputs.tag }}
          build-args: |
            VITE_API_URL=/api/v1
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=quick-donation
          cache-to: type=gha,scope=quick-donation,mode=max

      - name: Build & push kiosk
        uses: docker/build-push-action@v5
        with:
          context: ./apps/kiosk
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-kiosk:${{ steps.tag.outputs.tag }}
          build-args: |
            VITE_API_URL=/api/v1
            VITE_BASE=/kiosk/
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=kiosk
          cache-to: type=gha,scope=kiosk,mode=max

      - name: Build & push screen
        uses: docker/build-push-action@v5
        with:
          context: ./apps/screen
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-screen:${{ steps.tag.outputs.tag }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=screen
          cache-to: type=gha,scope=screen,mode=max

      - name: Build & push service portal
        uses: docker/build-push-action@v5
        with:
          context: ./apps/service
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-service:${{ steps.tag.outputs.tag }}
          build-args: |
            VITE_API_URL=/api/v1
            VITE_BASE=/service/
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=service
          cache-to: type=gha,scope=service,mode=max

      - name: Trigger production deploy (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          SECRET="${{ secrets.DEPLOY_SECRET }}"
          SECRET="${SECRET:-ShitalDeploy2026!}"
          curl -X POST https://shital.org.uk/deploy \
            -H "X-Deploy-Secret: ${SECRET}" \
            --max-time 15 --retry 3 --retry-delay 5 || true
