name: Shital ERP CI/CD

on:
  push:
    branches: [main, 'claude/**', develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"

jobs:
  # ─── Detect changed paths ─────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:       ${{ steps.filter.outputs.backend }}
      frontend:      ${{ steps.filter.outputs.frontend }}
      quick-donation: ${{ steps.filter.outputs.quick-donation }}
      admin:         ${{ steps.filter.outputs.admin }}
      kiosk:         ${{ steps.filter.outputs.kiosk }}
      screen:        ${{ steps.filter.outputs.screen }}
      service:       ${{ steps.filter.outputs.service }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'apps/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
            quick-donation:
              - 'apps/quick-donation/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            kiosk:
              - 'apps/kiosk/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            screen:
              - 'apps/screen/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            service:
              - 'apps/service/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'

  # ─── Python Backend Tests ──────────────────────────────────────────────────
  backend-tests:
    name: Python Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shital_test
          POSTGRES_USER: shital
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run linting
        working-directory: backend
        run: ruff check src/

      - name: Run type checking
        working-directory: backend
        run: mypy src/shital --ignore-missing-imports

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://shital:test_password@localhost:5432/shital_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long
          ANTHROPIC_API_KEY: test-key
          APP_ENV: test
        run: pytest tests/ -v --cov=src/shital --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: backend/coverage.xml

  # ─── Frontend Tests ────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @shital/db exec prisma generate

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build --filter=@shital/config --filter=@shital/db

  # ─── Build & Push to GHCR ─────────────────────────────────────────────────
  docker-build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [changes, backend-tests, frontend-tests]
    # Build only on main/develop/claude branches or manual trigger.
    # Tests must not have FAILED — but skipped (path-filter unmatched) is fine.
    # Per-job checks instead of contains(needs.*.result, ...) which was unreliable.
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.backend-tests.result != 'failure' &&
      needs.backend-tests.result != 'cancelled' &&
      needs.frontend-tests.result != 'failure' &&
      needs.frontend-tests.result != 'cancelled' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/claude/') || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          # Push and workflow_dispatch on main → :dev tag (auto-deploys to dev stack).
          # Prod is updated by a manual "Promote to Prod" button which retags
          # :dev → :latest. PR builds use :dev too (for review), claude/* legacy
          # branch keeps :latest for backward compat.
          if [ "${{ github.ref }}" = "refs/heads/claude/shital-erp-platform-iR2UF" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Capture build timestamp
        id: build_meta
        run: echo "ts=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build & push backend
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-backend:${{ steps.tag.outputs.tag }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_meta.outputs.ts }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push admin
        if: needs.changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-admin:${{ steps.tag.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max

      - name: Build & push quick-donation
        if: needs.changes.outputs.quick-donation == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/quick-donation/Dockerfile
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-quick-donation:${{ steps.tag.outputs.tag }}
          build-args: |
            VITE_API_URL=/api/v1
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=quick-donation
          cache-to: type=gha,scope=quick-donation,mode=max

      - name: Build & push kiosk
        if: needs.changes.outputs.kiosk == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/kiosk
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-kiosk:${{ steps.tag.outputs.tag }}
          build-args: |
            VITE_API_URL=/api/v1
            VITE_BASE=/kiosk/
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=kiosk
          cache-to: type=gha,scope=kiosk,mode=max

      - name: Build & push screen
        if: needs.changes.outputs.screen == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/screen
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-screen:${{ steps.tag.outputs.tag }}
          build-args: GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=screen
          cache-to: type=gha,scope=screen,mode=max

      - name: Build & push service
        if: needs.changes.outputs.service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/service/Dockerfile
          push: true
          tags: ghcr.io/kammelaraj-arch/shitaleco-service:${{ steps.tag.outputs.tag }}
          build-args: |
            VITE_API_URL=/api/v1
            VITE_BASE=/
            VITE_PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=service
          cache-to: type=gha,scope=service,mode=max

      - name: Trigger dev deploy
        # Push or manual run → auto-deploy to DEV stack only.
        # Prod is updated via the "Promote to Prod" button in the admin UI,
        # which retags :dev → :latest without rebuilding.
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/claude/shital-erp-platform-iR2UF'
        run: |
          SECRET="${{ secrets.DEPLOY_SECRET }}"
          SECRET="${SECRET:-ShitalDeploy2026!}"
          curl -X POST https://shital.org.uk/deploy \
            -H "X-Deploy-Secret: ${SECRET}" \
            -H "X-Deploy-Target: dev" \
            --max-time 15 --retry 3 --retry-delay 5 || true
