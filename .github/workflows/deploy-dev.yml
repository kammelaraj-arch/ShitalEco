name: Deploy to Dev

# Lightweight image-pull deploy. CI builds & pushes :dev images to GHCR;
# this workflow only updates the compose file on the VPS and tells docker
# to pull + restart. Takes ~1 minute, never builds anything on the server.
#
# Triggers on every push to main, develop, or any claude/* working branch
# so contributors can ship by simply running `git push`.

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Pull :dev images & restart dev stack
    runs-on: ubuntu-latest
    # Wait for CI to finish pushing the :dev images before we try to pull them.
    # (CI runs in parallel; we don't gate on it directly because GitHub Actions
    # doesn't natively support cross-workflow waits — instead we sleep briefly
    # and the docker pull will simply fetch whatever's tagged :dev right now.)
    steps:
      - name: Wait for CI :dev images
        run: |
          echo "Sleeping 20s to let CI's docker-build job get a head start…"
          sleep 20

      - name: Pull :dev + restart dev stack on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          DEPLOY_REF: ${{ github.ref_name }}
        with:
          host: 192.248.147.205
          username: root
          password: ${{ secrets.VULTR_ROOT_PASSWORD }}
          port: 22
          timeout: 600s
          envs: GH_PAT,STRIPE_SECRET_KEY,STRIPE_PUBLISHABLE_KEY,ANTHROPIC_API_KEY,SENDGRID_API_KEY,MS_CLIENT_ID,MS_TENANT_ID,MS_CLIENT_SECRET,DEPLOY_REF
          script: |
            set -e
            echo "=== Deploy to Dev — branch=${DEPLOY_REF} ==="

            # ── Ensure repo exists on VPS (we only need docker-compose.dev.yml) ─
            if [ -d /opt/shitaleco-dev/.git ]; then
              cd /opt/shitaleco-dev
              git fetch origin --quiet
              git reset --hard "origin/${DEPLOY_REF}" --quiet
            else
              apt-get install -y git -q
              git clone --branch "${DEPLOY_REF}" --depth 1 \
                "https://${GH_PAT}@github.com/kammelaraj-arch/ShitalEco.git" /opt/shitaleco-dev
              cd /opt/shitaleco-dev
            fi

            # ── .env for dev (idempotent) ───────────────────────────────────────
            if [ ! -f .env.dev ]; then
              cat > .env.dev << 'ENVEOF'
            JWT_SECRET=shital-dev-jwt-secret-not-for-prod
            APP_ENV=development
            ENVEOF
            fi
            inject() {
              local file=$1 key=$2 val=$3
              [ -z "$val" ] && return
              if grep -q "^${key}=" "${file}"; then
                sed -i "s|^${key}=.*|${key}=${val}|" "${file}"
              else
                echo "${key}=${val}" >> "${file}"
              fi
            }
            inject .env.dev STRIPE_SECRET_KEY      "$STRIPE_SECRET_KEY"
            inject .env.dev STRIPE_PUBLISHABLE_KEY "$STRIPE_PUBLISHABLE_KEY"
            inject .env.dev ANTHROPIC_API_KEY      "$ANTHROPIC_API_KEY"
            inject .env.dev SENDGRID_API_KEY       "$SENDGRID_API_KEY"
            inject .env.dev MS_CLIENT_ID           "$MS_CLIENT_ID"
            inject .env.dev MS_TENANT_ID           "$MS_TENANT_ID"
            inject .env.dev MS_CLIENT_SECRET       "$MS_CLIENT_SECRET"
            # Token so docker compose pull can fetch from private GHCR packages
            inject .env.dev GITHUB_TOKEN           "$GH_PAT"

            set -a; source .env.dev; set +a
            ufw allow 8080/tcp 2>/dev/null || true

            # ── Login to GHCR + pull pre-built :dev images ──────────────────────
            echo "$GH_PAT" | docker login ghcr.io -u kammelaraj-arch --password-stdin
            echo "=== Pulling :dev images from GHCR ==="
            docker compose -f docker-compose.dev.yml pull

            # ── Recreate everything (DB stays put — just restarts) ──────────────
            echo "=== Recreating dev containers ==="
            docker compose -f docker-compose.dev.yml up -d --force-recreate --remove-orphans

            # ── Backend health check ────────────────────────────────────────────
            echo "=== Waiting for backend-dev health ==="
            DEV_OK=0
            for i in $(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
                DEV_OK=1; break
              fi
              echo "  attempt $i/24..."
            done
            if [ "$DEV_OK" -eq 0 ]; then
              echo "!!! Dev backend failed health check !!!"
              docker compose -f docker-compose.dev.yml logs --tail=50 backend-dev
              exit 1
            fi

            # Seed dev catalog (idempotent)
            curl -sf -X POST http://localhost:8001/api/v1/admin/seed-catalog || true

            echo ""
            echo "=== DEV deploy complete — branch ${DEPLOY_REF} ==="
            docker compose -f docker-compose.dev.yml ps
