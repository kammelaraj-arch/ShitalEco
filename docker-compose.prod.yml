version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shitaleco_db}
      POSTGRES_USER: ${POSTGRES_USER:-shitaleco_db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shitaleco_db_user} -d ${POSTGRES_DB:-shitaleco_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: ghcr.io/kammelaraj-arch/shitaleco-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shitaleco_db_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-shitaleco_db}
      APP_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://localhost:3002}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_TENANT_ID: ${MS_TENANT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_REDIRECT_URI: ${MS_REDIRECT_URI:-https://shital.org.uk/admin/auth-callback}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    image: ghcr.io/kammelaraj-arch/shitaleco-admin:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - internal

  quick-donation:
    image: ghcr.io/kammelaraj-arch/shitaleco-quick-donation:latest
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  kiosk:
    image: ghcr.io/kammelaraj-arch/shitaleco-kiosk:latest
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  screen:
    image: ghcr.io/kammelaraj-arch/shitaleco-screen:latest
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/hub:/usr/share/nginx/hub:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - admin
      - quick-donation
      - kiosk
      - screen
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  certbot-www:
  certbot-certs:

networks:
  internal:
    driver: bridge
